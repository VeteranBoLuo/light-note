name: 部署前端+后端到服务器（手动触发）

# 一次性把前端和后端都部署一遍，复用 scripts/deploy.sh（内部并行跑 deploy-web.sh + deploy-server.sh）。
# 日常单独部署用「部署前端到服务器」/「部署后端到服务器」两个工作流；只有两边都要更新时才用这个。
#
# 需要的仓库 Secret（Settings → Secrets and variables → Actions）：
#   SSH_PRIVATE_KEY —— 能登录 root@139.9.83.16 的私钥（与前端/后端 deploy 工作流共用同一个）
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-all-${{ github.ref }}
  cancel-in-progress: false # 部署不中途取消，避免半途中断

jobs:
  deploy-all:
    runs-on: ubuntu-latest
    steps:
      - name: 读取仓库内容
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: 安装 nodejs
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: 安装依赖(workspace)
        run: pnpm install --frozen-lockfile

      - name: 准备 SSH 私钥与 known_hosts
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/hermes_server
          chmod 600 ~/.ssh/hermes_server
          ssh-keyscan -H 139.9.83.16 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: 部署前端+后端(复用 scripts/deploy.sh)
        run: pnpm deploy:all
