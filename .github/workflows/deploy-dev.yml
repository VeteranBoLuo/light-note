name: 手动部署前端到服务器（兜底，日常用本地 scripts/deploy*.sh）

# 已从「push 自动部署」降级为「仅手动触发」：
# 日常部署走本地脚本(更快);此工作流仅在不便用本机时,去 Actions 页手动跑。
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy-web:
    runs-on: ubuntu-latest
    steps:
      - name: 读取仓库内容
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: 安装 nodejs
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: 安装依赖(workspace)
        run: pnpm install --frozen-lockfile

      - name: 构建前端
        run: pnpm --filter web build

      - name: 部署 dist 到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          # strip_components 去掉 apps/web,使 dist 落到 /www/wwwroot/dist(与旧版一致)
          # 兜底路径,首次手动触发时确认落点
          source: 'apps/web/dist'
          strip_components: 2
          target: '/www/wwwroot'
