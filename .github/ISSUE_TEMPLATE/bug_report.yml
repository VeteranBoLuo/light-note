name: Bug 报告
description: 报告可以稳定复现的功能异常
title: "[Bug] "
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请先搜索已有 Issue，并确保内容中不包含账号、Cookie、Token、私密笔记或其他敏感信息。
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 实际发生了什么？你原本期望什么结果？
      placeholder: 请简洁描述问题和预期行为。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开……
        2. 点击……
        3. 看到……
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 影响模块
      options:
        - 书签
        - 笔记
        - 云空间
        - 标签与资源中心
        - AI 助手
        - 账号与登录
        - 移动端
        - 其他
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 使用环境
      description: 请填写设备、操作系统和浏览器版本。
      placeholder: 例如：macOS 15 / Chrome 138
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: 截图或补充信息
      description: 可提供脱敏后的截图、控制台错误或相关链接。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交确认
      options:
        - label: 我已搜索现有 Issue，未发现相同问题。
          required: true
        - label: 我确认报告中不包含密钥、Cookie、私密内容或用户数据。
          required: true
