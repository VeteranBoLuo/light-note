<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=7" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=7" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=7" />
    <link rel="shortcut icon" href="/favicon.ico?v=7" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=7" />
    <link rel="mask-icon" href="/safari-pinned-tab.svg?v=7" color="#615ced" />
    <link rel="manifest" href="/site.webmanifest?v=7" />
    <meta name="theme-color" content="#615ced" />
    <meta name="apple-mobile-web-app-title" content="轻笺" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ===== 核心 SEO 元标签 ===== -->
    <title>轻笺 - 轻量级知识管理工具</title>
    <meta
      name="description"
      content="轻笺是一个书签、云笔记和云存储管理平台，支持多标签分类、智能检索和数据同步。帮助用户高效管理网页书签、个人笔记和云端文件。"
    />
    <meta name="keywords" content="书签管理，云笔记，云空间存储，标签分类，知识管理" />
    <meta name="author" content="轻笺团队" />
    <meta name="baidu-site-verification" content="codeva-EXqHTBpFSg" />
    <!-- SPA 基础空壳及登录态页面默认不收录；构建期预渲染成功的公开页会改为 index, follow。 -->
    <meta name="robots" content="noindex, nofollow" />
    <!-- canonical 指向 /landing 而非自身:根路径 / 是纯客户端重定向(无保存偏好的访客默认也会被带去
         /landing),自身对不执行 JS 的爬虫是空壳,把权重信号汇总到真正有预渲染正文的 /landing -->
    <link rel="canonical" href="https://boluo66.top/landing" />

    <!-- ===== Open Graph 协议 ===== -->
    <meta property="og:title" content="轻笺 - AI 智能书签管理平台 | 云笔记 | 云空间 | 智能知识管理" />
    <meta
      property="og:description"
      content="轻笺是一个轻量级的知识管理平台，集成书签管理、云笔记和云空间功能，支持多标签分类、智能检索和跨设备同步。"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://boluo66.top/landing" />
    <meta property="og:image" content="https://boluo66.top/og-card.png" />
    <meta property="og:image:alt" content="轻笺｜书签、笔记、文件与 AI 的轻量级知识管理平台" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="轻笺" />
    <meta property="og:locale" content="zh_CN" />

    <!-- ===== Twitter Card ===== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="轻笺 - AI 智能书签管理平台 | 云笔记 | 云空间 | 智能知识管理" />
    <meta
      name="twitter:description"
      content="轻笺集成书签管理、云笔记和云空间三大功能，统一标签体系串联，内置全局搜索与 AI 助手，支持中英文双语和深色模式，注册即用。"
    />
    <meta name="twitter:image" content="https://boluo66.top/og-card.png" />
    <meta name="twitter:image:alt" content="轻笺｜书签、笔记、文件与 AI 的轻量级知识管理平台" />

    <!-- ===== 结构化数据 (JSON-LD) - 用于 SEO ===== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "轻笺",
        "description": "一个集成的书签、笔记和云存储管理平台，支持多标签分类、智能检索和跨设备同步功能。",
        "url": "https://boluo66.top/landing",
        "image": "https://boluo66.top/og-card.png",
        "applicationCategory": "ProductivityApplication",
        "operatingSystem": "Any",
        "permissions": "browser",
        "featureList": [
          "书签管理",
          "云笔记",
          "云空间存储",
          "统一标签体系",
          "全局搜索",
          "AI 助手对话",
          "中英文双语",
          "深色模式"
        ],
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "CNY"
        },
        "author": {
          "@type": "Organization",
          "name": "轻笺",
          "url": "https://boluo66.top/landing"
        }
      }
    </script>
  </head>
  <body style="padding: 0; margin: 0">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
